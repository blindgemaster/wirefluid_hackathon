<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cricket Scholarship DAO</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #FAFBFC;
        color: #1E293B;
        -webkit-text-size-adjust: 100%;
      }
      a { color: #2563EB; }
      ::selection { background: #BFDBFE; }
      input, button, select, textarea { font-family: inherit; }

      /* Prevent iOS zoom on input focus */
      input, select, textarea { font-size: 16px; }

      /* ----- Mobile responsiveness (≤ 640px) ----- */
      @media (max-width: 640px) {
        /* Main page container — tighter side padding */
        main {
          padding: 16px 12px !important;
        }
        /* Header — stack logo & nav nicely */
        .app-header {
          padding: 10px 12px !important;
          gap: 10px !important;
        }
        .app-header-brand {
          font-size: 15px !important;
        }
        .app-header-left {
          gap: 10px !important;
          width: 100% !important;
        }
        .app-header-nav {
          width: 100%;
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
          flex-wrap: nowrap !important;
          scrollbar-width: none;
        }
        .app-header-nav::-webkit-scrollbar { display: none; }
        .app-header-nav a {
          font-size: 12px !important;
          padding: 6px 10px !important;
          white-space: nowrap;
        }

        /* Page hero */
        .page-title { font-size: 20px !important; }
        .page-subtitle { font-size: 13px !important; }

        /* Generic cards — reduce padding on small screens */
        .responsive-card { padding: 14px !important; }

        /* Any grid with the responsive-grid class stacks on mobile */
        .responsive-grid {
          grid-template-columns: 1fr !important;
        }

        /* Big scholarship amount fits small screens */
        .scholarship-amount { font-size: 26px !important; }

        /* Buttons shouldn't overflow */
        .full-on-mobile { width: 100% !important; }

        /* Flex rows that should wrap on mobile */
        .wrap-on-mobile {
          flex-wrap: wrap !important;
        }
        .wrap-on-mobile > * {
          flex: 1 1 auto;
        }
      }

      /* Extra-small: phones under 380px */
      @media (max-width: 380px) {
        .app-header-brand { font-size: 13px !important; }
        main { padding: 12px 8px !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
