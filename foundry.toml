[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["../fact/contracts/lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
# Allow Solidity to read sources from the neighboring `fact` (DON) repo so we
# can import the real oracle contracts via the `don/` remapping below.
allow_paths = ["../fact/contracts/src"]
remappings = [
    "forge-std/=../fact/contracts/lib/forge-std/src/",
    "don/=../fact/contracts/src/"
]

[rpc_endpoints]
wirefluid_testnet = "https://evm.wirefluid.com"
localhost = "http://127.0.0.1:8545"
